version: 1
disable_existing_loggers: False
formatters:
  default:
    format: '%(asctime)s %(levelname)s [%(name)s] %(message)s'
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
loggers:
  dnsss:
    level: INFO
    handlers: [default]
    propagate: no
root:
  level: INFO
  handlers: [default]
  propagate: no